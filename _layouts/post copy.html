---
layout: default
---

<article>
  <h2>{{ page.title }}</h2>
  <small>{{ page.date | date_to_string }}</small>
  <div>{{ content }}</div>

  {% if page.tags.size > 0 %}
    <div class="tags">
      Теги: 
      {% for tag in page.tags %}
        <a href="/tags.html#{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </div>
  {% endif %}
</article>
