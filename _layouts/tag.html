---
layout: default
---

<h1>Посты с тегом "{{ page.tag }}"</h1>

<ul>
  {% assign posts = site.tags[page.tag] %}
  {% for post in posts %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <small>{{ post.date | date_to_string }}</small>
      <p>{{ post.excerpt }}</p>
    </li>
  {% endfor %}
</ul>
