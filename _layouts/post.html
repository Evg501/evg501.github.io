---
layout: default-right1
---

<article class=" mx-auto bg-white rounded-xl shadow-md overflow-hidden fade-in delay-2">
  <!-- Article Header -->
  <div class="p-8">
      <div class="flex items-center justify-between mb-4">
          <span class="text-sm text-gray-500">{{ page.date | date_to_string }}</span>
          <span class="px-3 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded-full">
            {% for tag in page.tags %}
            <a href="/tags.html#{{ tag | slugify }}" class="hover:underline">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
            {% endfor %}
          </span>
      </div>
      
      <h2 class="text-3xl font-bold text-gray-800 mb-4">{{ page.title }}</h2>
      
      <div class="prose prose-blue max-w-none text-gray-600">
        {{ content }}
      </div>
  </div>
  
  <!-- Social Share -->
  <div class="px-8 pb-6 flex space-x-4 text-gray-500">
      <span>Share:</span>
      <a href="#" class="hover:text-blue-600 transition-colors" aria-label="Share on Twitter">
          <i class="fab fa-twitter"></i>
      </a>
      <a href="#" class="hover:text-blue-800 transition-colors" aria-label="Share on Facebook">
          <i class="fab fa-facebook"></i>
      </a>
      <a href="#" class="hover:text-gray-900 transition-colors" aria-label="Share on LinkedIn">
          <i class="fab fa-linkedin"></i>
      </a>
  </div>
</article>
