<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom CSS for animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

                    </div>
                </div>
                
                <!-- Mobile Menu -->
                <div id="mobile-menu" class="hidden md:hidden mt-4 fade-in">
                    <nav class="flex flex-col space-y-2">
                        <a href="https://evg501.github.io/" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Главная</a>
                        <a href="https://evg501.github.io/tags.html" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Тэги</a>
                        <a href="#" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Архив</a>
                        <a href="#" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Обо мне</a>
                    </nav>
                </div>
                
                <!-- Desktop Menu -->
                <nav class="hidden md:flex space-x-4 mt-4 fade-in delay-3">
                    <a href="https://evg501.github.io/" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Главная</a>
                    <a href="https://evg501.github.io/tags.html" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Тэги</a>
                    <a href="#" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Архив</a>
                    <a href="#" class="px-3 py-2 rounded hover:bg-blue-700 transition-colors">Обо мне</a>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow container mx-auto px-4 py-8">
            <article class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden fade-in delay-2">
                <!-- Article Header -->
                <div class="p-8">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm text-gray-500">10 Jun 2025</span>
                        <span class="px-3 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded-full">
                            <a href="https://evg501.github.io/tags.html#telegram" class="hover:underline">telegram</a>
                        </span>
                    </div>
                    
                    <h2 class="text-3xl font-bold text-gray-800 mb-4">ping2</h2>
                    
                    <div class="prose prose-blue max-w-none text-gray-600">
                        <p>Hello world!3 Hello world!3</p>
                    </div>
                </div>
                
                <!-- Social Share -->
                <div class="px-8 pb-6 flex space-x-4 text-gray-500">
                    <span>Share:</span>
                    <a href="#" class="hover:text-blue-600 transition-colors" aria-label="Share on Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" class="hover:text-blue-800 transition-colors" aria-label="Share on Facebook">
                        <i class="fab fa-facebook"></i>
                    </a>
                    <a href="#" class="hover:text-gray-900 transition-colors" aria-label="Share on LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                </div>
            </article>
            
            <!-- Navigation between posts -->
            <div class="max-w-3xl mx-auto mt-8 flex justify-between fade-in delay-3">
                <a href="#" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Previous
                </a>
                <a href="#" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors flex items-center">
                    Next

                </a>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-gray-800 text-gray-300 py-8 mt-12 fade-in delay-4">
            <div class="container mx-auto px-4">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p>&copy; 2025 EVG501 Blog. All rights reserved.</p>
                    </div>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-400 hover:text-white transition-colors" aria-label="GitHub">

                        </a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Mobile menu toggle
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            const isHidden = menu.classList.contains('hidden');
            
            if (isHidden) {
                menu.classList.remove('hidden');
                menu.classList.add('block');
            } else {
                menu.classList.remove('block');
                menu.classList.add('hidden');
            }
        });

        // Add smooth scrolling to all links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
