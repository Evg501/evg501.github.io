<div class="bg-white rounded-xl shadow-md p-6 mb-6">
    <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center">
        <i class="fas fa-tags mr-2 text-purple-500"></i>
        Теги
    </h2>
    <div class="tag-cloud flex flex-wrap gap-2">
        {% assign tags = site.tags | sort %}
        {% for tag in tags %}
          <a href="/tags.html#{{ tag[0] | slugify }}" class="bg-slate-100 hover:bg-blue-100 text-slate-700 hover:text-blue-700 px-3 py-1 rounded-full text-sm tag-size-{{ tag[1].size }}">
            {{ tag[0] }} ({{ tag[1].size }})
          </a>
        {% endfor %}           
    </div>
</div>
